# ci/helm-template.yml
#
# Renders the chart against each committed values-*.yaml overlay to
# catch breakage that `helm lint` alone misses (template execution
# errors, missing required values, malformed Go templates, missing
# `lookup` helpers, etc.). Lint only validates the chart structure;
# template forces every code path to execute.
#
# We pass `--api-versions monitoring.coreos.com/v1 --api-versions
# autoscaling/v2` so that templates gated on `.Capabilities.APIVersions.Has`
# (e.g. the gitlab-runner subchart's ServiceMonitor, the sidekiq HPA)
# actually render — otherwise they get short-circuited and the test
# becomes vacuous.
#
# The `--set toolboxSsh.publicKey=ci-placeholder-key` override is the
# minimum needed to satisfy the chart's `required` declaration without
# pulling local-values.yaml (which carries real secrets and isn't on the
# runner). The placeholder value is never applied to a cluster — it's
# only here so `helm template` can complete the render.

"Helm Template":
  stage: "Lint"
  image: alpine/helm:3
  variables:
    HELM_CACHE_HOME: /tmp/.helm/cache
    HELM_CONFIG_HOME: /tmp/.helm/config
    HELM_DATA_HOME: /tmp/.helm/data
  before_script:
    - helm version --short
    - helm repo add gitlab    https://charts.gitlab.io
    - helm repo add traefik   https://traefik.github.io/charts
    - helm repo add seaweedfs https://seaweedfs.github.io/seaweedfs/helm
    - helm repo update
    - helm dependency update .
  script:
    - |
      for f in values-*.yaml; do
        [ -e "$f" ] || { echo "no values-*.yaml at chart root"; exit 1; }
        echo "==> helm template . -f $f"
        helm template gitlab . -f "$f" \
          --api-versions monitoring.coreos.com/v1 \
          --api-versions autoscaling/v2 \
          --set toolboxSsh.publicKey=ci-placeholder-key \
          > /dev/null
      done
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
