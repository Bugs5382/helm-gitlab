name: Bug report
description: A defect in existing behavior.
title: "fix(<scope>): <short description>"
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: The observed behavior, with steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, OS/runtime, and any relevant logs.
    validations:
      required: false
