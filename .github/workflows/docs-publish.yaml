name: "Docs Publish"
# Build and publish the docusaurus documentation site to GitHub Pages.
#
# TAG-GATED ON PURPOSE: the docs site ships with a release, not on every merge
# to main. Nothing here runs on push to a branch — only when the maintainer
# publishes a release, which creates a `vX.Y.Z` tag. (Manual runs are allowed
# via workflow_dispatch for re-publishing the latest tag's docs.)
#
# Requires repository Settings -> Pages -> Build and deployment -> Source set to
# "GitHub Actions".
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
# One concurrent Pages deployment; let an in-flight publish finish rather than
# cancelling it (a half-deployed docs site is worse than a slightly stale one).
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🏗️ Build the docs site
        run: npm run build
      - name: ⚙️ Configure Pages
        uses: actions/configure-pages@v5
      - name: ⬆️ Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build
  deploy:
    name: 🚀 Deploy
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
