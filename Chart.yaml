apiVersion: v2
name: helm-gitlab
description: >-
  Umbrella chart deploying GitLab on Kubernetes with everything in-cluster:
  hand-rolled PostgreSQL 18 (1 primary + 1 standby, async streaming
  replication, manual failover), the official Valkey chart, Traefik v3 on
  an isolated ingress class, and
  SeaweedFS for S3-compatible object storage (replacing the bundled MinIO).
  TLS is pluggable: bring your own cert-manager ClusterIssuer (off by default)
  or supply secrets from an external source. Prometheus metrics surface across
  every component; ServiceMonitor emission is per-environment so clusters
  without prometheus-operator install cleanly. One-shot `helm install`, single
  namespace.
type: application
version: 0.1.0
appVersion: "17.0"
kubeVersion: ">=1.28.0"
icon: https://about.gitlab.com/images/press/logo/png/gitlab-icon-rgb.png

keywords:
  - gitlab
  - postgresql
  - valkey
  - traefik
  - acme
  - cert-manager
  - seaweedfs

maintainers:
  - name: Bugs5382
    url: https://github.com/Bugs5382

dependencies:
  # gitlab subchart 10.1.1 = GitLab v19.1.1 (10.0.x = v19.0.x, 9.11.x was
  # v18.11.x). Chart 10.x has breaking changes — see the "Targeting the
  # latest GitLab (19.x)" docs page: Gateway API is on by default (disabled
  # under global.gatewayApi below), bundled object storage is gone (external
  # psql/redis + a backup s3cmd Secret are wired below).
  - name: gitlab
    version: 10.1.1
    repository: https://charts.gitlab.io
    condition: gitlab.enabled

  - name: traefik
    version: 32.1.1
    repository: https://traefik.github.io/charts
    condition: traefik.enabled

  # valkey: upstream chart (un-forked). It was previously vendored at
  # charts/valkey/ with a one-line patch renaming the global `common.image`
  # helper, which clashed with SeaweedFS's same-named helper. SeaweedFS fixed
  # its side upstream (PR #9044 — namespaced all helpers, in seaweedfs chart
  # 4.31.0+, and our seaweedfs 4.35.0 has it), so nothing else defines
  # `common.image` and the collision is gone. Fork no longer needed.
  - name: valkey
    version: 0.10.0
    repository: https://valkey.io/valkey-helm
    condition: valkey.enabled

  - name: seaweedfs
    version: 4.35.0
    repository: https://seaweedfs.github.io/seaweedfs/helm
    condition: seaweedfs.enabled

  # Second SeaweedFS instance, aliased, for the disposable runner cache.
  # Same chart; `seaweedfsCache.nameOverride: seaweedfs-cache` keeps its
  # resources from colliding with the durable instance. emptyDir-backed
  # (see values.yaml seaweedfsCache block) so cache churn stays off Longhorn.
  - name: seaweedfs
    version: 4.35.0
    repository: https://seaweedfs.github.io/seaweedfs/helm
    alias: seaweedfsCache
    condition: seaweedfsCache.enabled