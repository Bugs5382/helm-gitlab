# Taskfile — runs golic (Bugs5382's license-header tool) to keep the Apache-2.0
# header on every source file. `task license` checks (CI; never writes);
# `task license:fix` injects the header into any file missing it.
version: '3'
vars:
  GOLIC_VERSION: v0.2.0
  TEMPLATE_LIC: "apache2"
  COMMON_LIC: "2026 Shane"
tasks:
  license:
    desc: Verify every source file carries the Apache-2.0 header (CI; never writes).
    cmds:
      - go install github.com/Bugs5382/golic/cmd/golic@{{.GOLIC_VERSION}}
      - golic inject -t {{.TEMPLATE_LIC}} -c "{{.COMMON_LIC}}" --dry -x
  license:fix:
    desc: Inject the Apache-2.0 header into any source file missing it.
    cmds:
      - go install github.com/Bugs5382/golic/cmd/golic@{{.GOLIC_VERSION}}
      - golic inject -t {{.TEMPLATE_LIC}} -c "{{.COMMON_LIC}}"
