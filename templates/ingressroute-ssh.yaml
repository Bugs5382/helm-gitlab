{{- /*
Git-over-SSH: route Traefik's `ssh` entrypoint (port 22) to the gitlab-shell
Service. Plain TCP — SSH has its own transport crypto. HostSNI(`*`) is the
literal rule Traefik requires for non-TLS TCP routes.
*/}}
{{- if and .Values.gitlab.enabled .Values.traefik.enabled .Values.gitssh.enabled -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ .Release.Name }}-git-ssh
  labels: {{- include "helm-gitlab.labels" . | nindent 4 }}
  annotations:
    # Required so this CRD passes Traefik's `providers.kubernetescrd.ingressClass`
    # filter (set to ingressClassName in values). Without it, Traefik
    # silently drops the route and the entrypoint falls back to HTTP-400 on TCP
    # connects.
    kubernetes.io/ingress.class: {{ .Values.ingressClassName }}
spec:
  entryPoints:
    - ssh
  routes:
    - match: HostSNI(`*`)
      services:
        - name: {{ .Values.gitssh.serviceName | default (printf "%s-gitlab-shell" .Release.Name) }}
          port: {{ .Values.gitssh.servicePort | default 22 }}
{{- end -}}
