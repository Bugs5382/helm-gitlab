{{- if .Values.postgres.enabled -}}
{{- /*
Credentials Secret for the hand-rolled Postgres (primary + standby).
Key shape matches what the gitlab subchart reads via `global.psql`
(see memory/gitlab-db-secret-keys.md).

Keys:
  username             — app role name (gitlab); matches global.psql.username
  password             — app role password; what GitLab actually reads
  superuser-password   — postgres superuser password (admin/runbook use)
  replication-password — replicator role password (standby's pg_basebackup
                         and streaming auth)

`helm.sh/resource-policy: keep` so `helm uninstall` cannot delete this
Secret out from under a database that's still on disk. The pgPassword
helper's `lookup` makes upgrades idempotent (existing keys preserved).
*/ -}}
{{- $super := include "helm-gitlab.pgPassword" (dict "ctx" . "key" "superuser-password") -}}
{{- $app   := include "helm-gitlab.pgPassword" (dict "ctx" . "key" "password") -}}
{{- $repl  := include "helm-gitlab.pgPassword" (dict "ctx" . "key" "replication-password") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.secretName }}
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  username: {{ .Values.postgres.appUser | quote }}
  password: {{ $app | quote }}
  superuser-password: {{ $super | quote }}
  replication-password: {{ $repl | quote }}
{{- end -}}
