{{- /*
Registry offline garbage-collect CronJob.

Why this exists: the gitlab-9.x umbrella chart ships only a `_gc.tpl`
helper for registry GC, not a scheduled CronJob. Operators are expected
to run GC manually. Without GC, every layer ever pushed sits on the
storage backend forever (confirmed root cause of the 2026-05-18
SeaweedFS volume-fill that broke registry pushes).

Safety posture:
  - Disabled by default (registryGc.enabled: false). Flip per env once
    validated by running the rendered manifest as a one-shot Job.
  - Dry-run by default (registryGc.dryRun: true). Reports what WOULD be
    freed without deleting anything. Flip to false only after reviewing
    the dry-run output and arranging a low-traffic window — concurrent
    writes during a real GC scan can orphan layers the scan missed.
  - concurrencyPolicy: Forbid — long-running scans cannot overlap.

The command runs against a minimal registry config.yml rendered inline.
GC only consults the storage block, so we skip auth/http/database
sections the running registry uses. S3 credentials come from the same
secret the registry pod uses (seaweedfsAuth.secretName, default
`seaweedfs-s3-config`).
*/}}
{{- if .Values.registryGc.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-registry-gc-config
  labels: {{- include "helm-gitlab.labels" . | nindent 4 }}
data:
  config.yml: |
    version: 0.1
    log:
      level: info
      formatter: json
    storage:
      s3:
        bucket: {{ index .Values.objectStorage.buckets "registry" | quote }}
        region: local
        regionendpoint: {{ include "helm-gitlab.s3Endpoint" . }}
        pathstyle: true
        v4auth: true
        secure: false
        rootdirectory: /
      delete:
        enabled: true
      maintenance:
        readonly:
          enabled: false
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-registry-gc
  labels: {{- include "helm-gitlab.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.registryGc.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels: {{- include "helm-gitlab.labels" . | nindent 12 }}
        spec:
          restartPolicy: Never
          containers:
            - name: gc
              image: {{ .Values.registryGc.image | quote }}
              env:
                - name: REGISTRY_STORAGE_S3_ACCESSKEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.seaweedfsAuth.secretName }}
                      key: accessKey
                - name: REGISTRY_STORAGE_S3_SECRETKEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.seaweedfsAuth.secretName }}
                      key: secretKey
              command: ["/bin/sh", "-ec"]
              args:
                - >-
                  echo "registry-gc starting; dryRun={{ .Values.registryGc.dryRun }}, deleteUntagged={{ .Values.registryGc.deleteUntagged }}";
                  exec /bin/registry garbage-collect
                  {{- if .Values.registryGc.dryRun }} --dry-run{{- end }}
                  {{- if .Values.registryGc.deleteUntagged }} -m{{- end }}
                  /etc/docker/registry/config.yml
              volumeMounts:
                - name: config
                  mountPath: /etc/docker/registry
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
          volumes:
            - name: config
              configMap:
                name: {{ .Release.Name }}-registry-gc-config
                items:
                  - key: config.yml
                    path: config.yml
{{- end }}
