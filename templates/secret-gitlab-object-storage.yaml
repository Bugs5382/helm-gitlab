{{- /*
GitLab object-storage + Container Registry Secrets.

The data plane is LOCAL: every read/write goes to the in-cluster SeaweedFS
S3 gateway at the ClusterIP DNS below. Nothing leaves the cluster.

The `provider: AWS` literal in both blobs is a requirement of the client
libraries (fog-aws for GitLab, docker-distribution S3 driver for the
Registry). Both use "AWS" as the dispatch key for the generic S3 API and
will not accept any other value. It is not a destination.
*/ -}}
{{- $ak := include "helm-gitlab.s3AccessKey" . -}}
{{- $sk := include "helm-gitlab.s3SecretKey" . -}}
{{- $ep := include "helm-gitlab.s3Endpoint" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-local-s3-connection
  labels: {{- include "helm-gitlab.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  # Local SeaweedFS — data never leaves the cluster.
  # `provider: AWS` is a fog-aws library literal, not a destination.
  # `endpoint:` is what actually routes requests.
  connection: |
    provider: AWS
    region: local
    aws_access_key_id: {{ $ak }}
    aws_secret_access_key: {{ $sk }}
    aws_signature_version: 4
    endpoint: {{ $ep }}
    path_style: true
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-local-s3-registry
  labels: {{- include "helm-gitlab.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  # Local SeaweedFS — same comments apply. The Registry uses docker-
  # distribution's S3 driver, whose `s3:` config block likewise requires
  # an AWS-style schema even for non-AWS backends.
  config: |
    s3:
      accesskey: {{ $ak }}
      secretkey: {{ $sk }}
      bucket: {{ .Values.objectStorage.buckets.registry }}
      region: local
      regionendpoint: {{ $ep }}
      encrypt: false
      secure: false
      v4auth: true
      pathstyle: true
