{{- /*
Valkey auth Secret — consumed by the official valkey-io/valkey-helm chart
via auth.usersExistingSecret, and by the GitLab subchart via
global.redis.auth.secret/key.

Password is generated ONCE on first install via randAlphaNum, and preserved
across upgrades by `helm lookup` in helm-gitlab.valkeyPassword. The Secret
is annotated `helm.sh/resource-policy: keep` so `helm uninstall` won't
destroy it — losing this password effectively bricks the Valkey data.

Escape hatch: set .Values.valkeyAuth.existingSecret to skip this template
and let you bring your own Secret (e.g. from sealed-secrets / SOPS).
*/ -}}
{{- if and .Values.valkeyAuth.enabled (not .Values.valkeyAuth.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.valkeyAuth.secretName }}
  labels: {{- include "helm-gitlab.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  # Key name matches what both consumers reference:
  #   - valkey chart: auth.aclUsers.default.passwordKey = "password"
  #   - gitlab chart: global.redis.auth.key = "password"
  password: {{ include "helm-gitlab.valkeyPassword" . | quote }}
{{- end -}}
