{{- if and .Values.seaweedfsHousekeeping .Values.seaweedfsHousekeeping.multipartCleanup .Values.seaweedfsHousekeeping.multipartCleanup.enabled -}}
{{- /*
Weekly cleanup of stale/incomplete S3 multipart uploads on SeaweedFS.

SeaweedFS 3.73 does not implement S3 lifecycle policies for multipart
uploads; aborted PUTs leave parts behind that count toward bucket usage
forever. `weed shell s3.clean.uploads` is the documented way to reap
them. Wrapping it in a small CronJob makes the schedule reviewable and
auditable like any other Helm-tracked resource.

The job exec's into the running seaweedfs-s3 Deployment (which already
has the weed binary + cluster credentials) rather than spinning up a
new pod, mirroring the postgres-backup CronJob pattern. RBAC is scoped
narrowly to `pods/exec` in this namespace.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: seaweedfs-multipart-cleanup
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
    app: seaweedfs-housekeeping
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: seaweedfs-multipart-cleanup
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
    app: seaweedfs-housekeeping
rules:
  # `kubectl exec deploy/seaweedfs-s3` resolves the Deployment to a pod
  # before exec'ing, which requires a GET on the Deployment itself — not
  # just pods/exec. Without this the job fails at the resolution step and
  # never reaches `weed shell`.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: seaweedfs-multipart-cleanup
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
    app: seaweedfs-housekeeping
subjects:
  - kind: ServiceAccount
    name: seaweedfs-multipart-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: seaweedfs-multipart-cleanup
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: seaweedfs-multipart-cleanup
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
    app: seaweedfs-housekeeping
spec:
  schedule: {{ .Values.seaweedfsHousekeeping.multipartCleanup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 604800
      template:
        metadata:
          labels:
            {{- include "helm-gitlab.labels" . | nindent 12 }}
            app: seaweedfs-housekeeping
        spec:
          serviceAccountName: seaweedfs-multipart-cleanup
          restartPolicy: Never
          containers:
            - name: cleanup
              # rancher/kubectl is a `FROM scratch` single-binary image —
              # the actual weed shell command runs inside the SeaweedFS S3
              # pod where the binary and master/filer addresses are already
              # available, same pattern as the postgres-backup CronJob.
              image: docker.io/rancher/kubectl:v1.30.7
              imagePullPolicy: IfNotPresent
              args:
                - exec
                - deploy/seaweedfs-s3
                - --
                - sh
                - -c
                - >-
                  echo "s3.clean.uploads -timeAgo={{ .Values.seaweedfsHousekeeping.multipartCleanup.olderThan }}"
                  | weed shell -filer=seaweedfs-filer:8888 -master=seaweedfs-master:9333
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1001
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
{{- end -}}
