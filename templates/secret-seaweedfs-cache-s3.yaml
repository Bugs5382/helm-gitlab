{{- /*
SeaweedFS S3 config Secret for the disposable runner-cache instance
(seaweedfs-cache). Mirrors secret-seaweedfs-s3.yaml: camelCase keys for the
cache bucket-init Job, lowercase aliases for the gitlab-runner entrypoint's
cache-cred detection, and the seaweedfs_s3_config JSON consumed by the cache
s3 gateway via its existingConfigSecret.
*/ -}}
{{- if and .Values.seaweedfsCacheAuth.enabled (not .Values.seaweedfsCacheAuth.existingSecret) -}}
{{- $ak := include "helm-gitlab.cacheS3AccessKey" . -}}
{{- $sk := include "helm-gitlab.cacheS3SecretKey" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.seaweedfsCacheAuth.secretName }}
  labels: {{- include "helm-gitlab.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  accessKey: {{ $ak | quote }}
  secretKey: {{ $sk | quote }}
  accesskey: {{ $ak | quote }}
  secretkey: {{ $sk | quote }}
  seaweedfs_s3_config: |
    {
      "identities": [
        {
          "name": "gitlab",
          "credentials": [
            { "accessKey": {{ $ak | quote }}, "secretKey": {{ $sk | quote }} }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging", "GetObject", "PutObject", "DeleteObject"]
        }
      ]
    }
{{- end -}}
