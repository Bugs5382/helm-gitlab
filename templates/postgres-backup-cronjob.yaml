{{- if and .Values.postgres.enabled .Values.postgres.backup.enabled -}}
{{- /*
Daily pgBackRest full backup.

pgBackRest's backup model requires file-level PGDATA access (it copies
files directly, not via libpq). For a remote backup pod, that means SSH
to the DB host — which would require key management we'd rather avoid.

Instead, the CronJob runs a minimal kubectl image that `kubectl exec`s
into postgres-primary-0 and invokes pgbackrest there, where PGDATA is
on the local filesystem. This sidesteps the SSH setup and runs the
backup in the same security context as the DB.

ServiceAccount + Role + RoleBinding grant pods/exec only on the
postgres-primary StatefulSet pods in this namespace — narrowest scope
that lets the backup run.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-backup
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
    app: postgres
    role: backup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: postgres-backup
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
    app: postgres
    role: backup
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
    resourceNames: []
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: postgres-backup
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
    app: postgres
    role: backup
subjects:
  - kind: ServiceAccount
    name: postgres-backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: postgres-backup
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
    app: postgres
    role: backup
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 604800
      template:
        metadata:
          labels:
            {{- include "helm-gitlab.labels" . | nindent 12 }}
            app: postgres
            role: backup
        spec:
          serviceAccountName: postgres-backup
          restartPolicy: Never
          containers:
            - name: backup
              # rancher/kubectl is a `FROM scratch` single-binary image —
              # only /bin/kubectl exists, no shell. The pgbackrest binary
              # runs INSIDE postgres-primary-0 (via kubectl exec) where it
              # has direct PGDATA access; this container only ships kubectl.
              # Multi-step orchestration is done via the wrapper script
              # mounted on the target pod's filesystem (not needed for a
              # single backup invocation — the kubectl exec runs the whole
              # shell pipeline inside the target).
              image: docker.io/rancher/kubectl:v1.30.7
              imagePullPolicy: IfNotPresent
              args:
                - exec
                - postgres-primary-0
                - -c
                - postgres
                - --
                - bash
                - -c
                - |
                  set -euo pipefail
                  echo "=== triggering full backup ==="
                  pgbackrest --config=/etc/postgres/pgbackrest.conf \
                    --stanza=gitlab --type=full \
                    --log-level-console=info backup
                  echo "=== current pgbackrest info ==="
                  pgbackrest --config=/etc/postgres/pgbackrest.conf \
                    --stanza=gitlab info
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1001
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
{{- end -}}
