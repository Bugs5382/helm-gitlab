{{- if and .Values.seaweedfsHousekeeping .Values.seaweedfsHousekeeping.fsck .Values.seaweedfsHousekeeping.fsck.enabled -}}
{{- $fsck := .Values.seaweedfsHousekeeping.fsck -}}
{{- $q := $fsck.quiesceRunners | default dict -}}
{{- $runnerDeploy := $q.deployment | default (printf "%s-gitlab-runner" .Release.Name) -}}
{{- $buildNs := $q.buildNamespace | default "gitlab-runner-build" -}}
{{- /*
Periodic SeaweedFS filer/volume consistency check.

`weed shell volume.fsck -findMissingChunksInFiler` cross-checks every
filer metadata entry against the needles actually present on the volume
servers and reports entries whose chunks are gone. Those dangling
entries appear when a volume server takes an unclean restart: on recovery
SeaweedFS truncates unverifiable needle tails, but the filer still points
at them, so any client reading (or overwriting) the object hangs forever
retrying a 404 chunk. The 2026-06-11 incident was exactly this — a
rescheduled volume pod truncated needles across registry, artifact,
runner-cache and WAL-archive collections, and CI jobs touching an
orphaned cache key stalled.

QUIESCE FIRST. A scan run while runners are active races against
in-flight registry pushes and CI uploads and reports a flood of false
positives. So the job scales the runner manager to 0, waits for the
build namespace to drain, and only then scans — making the report
trustworthy. The runner manager is always scaled back to its original
replica count on exit (trap), even if the scan fails.

Two passes, by design:

1. AUTO-PURGE, scoped to the disposable cache collection only
   (`-collection {{ $fsck.cacheCollection }}` + `-reallyDeleteFromVolume`).
   Dropping a dangling cache pointer is self-healing: the next job sees a
   cache miss and regenerates. Scoping the only destructive pass to
   throwaway data keeps a stray purge harmless.

2. REPORT-ONLY, all collections, no purge flags. Surfaces dangling
   entries in registry/packages/artifacts/postgres-backup to the job log
   for a human to triage. Real data is never auto-deleted.

Runs in an alpine/k8s image (kubectl + shell) because the orchestration
needs to scale a Deployment, poll another namespace, and exec into the
SeaweedFS S3 pod (where the weed binary + cluster addresses live).
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: seaweedfs-fsck
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
    app: seaweedfs-housekeeping
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: seaweedfs-fsck
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
    app: seaweedfs-housekeeping
rules:
  # Scale the runner manager down/up, and resolve `exec deploy/seaweedfs-s3`.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: seaweedfs-fsck
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
    app: seaweedfs-housekeeping
subjects:
  - kind: ServiceAccount
    name: seaweedfs-fsck
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: seaweedfs-fsck
{{- if and $q.enabled $buildNs }}
---
# Cross-namespace: the job polls the build namespace to know when CI has
# drained. The SA lives in the release namespace; this binds it here.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: seaweedfs-fsck-build-watch
  namespace: {{ $buildNs }}
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
    app: seaweedfs-housekeeping
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: seaweedfs-fsck-build-watch
  namespace: {{ $buildNs }}
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
    app: seaweedfs-housekeeping
subjects:
  - kind: ServiceAccount
    name: seaweedfs-fsck
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: seaweedfs-fsck-build-watch
{{- end }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: seaweedfs-fsck
  labels:
    {{- include "helm-gitlab.labels" . | nindent 4 }}
    app: seaweedfs-housekeeping
spec:
  schedule: {{ $fsck.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 604800
      template:
        metadata:
          labels:
            {{- include "helm-gitlab.labels" . | nindent 12 }}
            app: seaweedfs-housekeeping
        spec:
          serviceAccountName: seaweedfs-fsck
          restartPolicy: Never
          containers:
            - name: fsck
              image: {{ $fsck.image | default "docker.io/alpine/k8s:1.30.7" }}
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -u
                  RNS="{{ .Release.Namespace }}"
                  RD="{{ $runnerDeploy }}"
                  BNS="{{ $buildNs }}"
                  QUIESCE="{{ $q.enabled | default false }}"
                  TIMEOUT={{ $q.drainTimeoutSeconds | default 900 }}

                  if [ "$QUIESCE" = "true" ]; then
                    ORIG=$(kubectl -n "$RNS" get deploy "$RD" -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "")
                    # Always restore the runner manager, even if the scan fails.
                    trap 'if [ -n "$ORIG" ]; then echo "[fsck] restoring $RD to $ORIG replicas"; kubectl -n "$RNS" scale deploy "$RD" --replicas="$ORIG" || true; fi' EXIT INT TERM
                    echo "[fsck] scaling $RD ($ORIG replicas) to 0"
                    kubectl -n "$RNS" scale deploy "$RD" --replicas=0 || true
                    elapsed=0
                    while [ "$elapsed" -lt "$TIMEOUT" ]; do
                      n=$(kubectl -n "$BNS" get pods --no-headers 2>/dev/null | grep -cE 'Running|Pending' || true)
                      [ "$n" = "0" ] && { echo "[fsck] $BNS drained"; break; }
                      echo "[fsck] waiting on $n build pods (${elapsed}/${TIMEOUT}s)"
                      sleep 15; elapsed=$((elapsed + 15))
                    done
                  fi

                  echo "[fsck] auto-purge dangling {{ $fsck.cacheCollection }} entries"
                  kubectl -n "$RNS" exec deploy/seaweedfs-s3 -- sh -c 'printf "lock\nvolume.fsck -findMissingChunksInFiler -collection {{ $fsck.cacheCollection }} -reallyDeleteFromVolume\nunlock\n" | weed shell -filer=seaweedfs-filer:8888 -master=seaweedfs-master:9333'

                  echo "[fsck] report-only full scan (all collections, no purge)"
                  kubectl -n "$RNS" exec deploy/seaweedfs-s3 -- sh -c 'printf "lock\nvolume.fsck -findMissingChunksInFiler\nunlock\n" | weed shell -filer=seaweedfs-filer:8888 -master=seaweedfs-master:9333'
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1001
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
{{- end -}}
