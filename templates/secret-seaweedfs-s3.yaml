{{- /*
SeaweedFS S3 configuration Secret.

The SeaweedFS chart's `s3.existingConfigSecret` consumer expects a key
`seaweedfs_s3_config` containing a JSON document with the identities and
credentials. See https://github.com/seaweedfs/seaweedfs/wiki/Amazon-S3-API
for the schema.

We also emit `accessKey` / `secretKey` (camelCase, for the bucket-init
Job and the GitLab object-storage Secret) plus `accesskey` / `secretkey`
(lowercase aliases, for the gitlab-runner subchart's entrypoint script
which uses lowercase filenames to detect cache credentials). Both sets
hold the same values.
*/ -}}
{{- if and .Values.seaweedfsAuth.enabled (not .Values.seaweedfsAuth.existingSecret) -}}
{{- $ak := include "helm-gitlab.s3AccessKey" . -}}
{{- $sk := include "helm-gitlab.s3SecretKey" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.seaweedfsAuth.secretName }}
  labels: {{- include "helm-gitlab.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  # camelCase keys — consumed by the bucket-init Job and the GitLab
  # object-storage Secret template (secret-gitlab-object-storage.yaml).
  accessKey: {{ $ak | quote }}
  secretKey: {{ $sk | quote }}
  # Lowercase aliases — required by the bundled gitlab-runner subchart's
  # entrypoint script, which tests `[[ -f /secrets/accesskey && -f
  # /secrets/secretkey ]]` to decide whether to export the cache S3 envs.
  # Without these, the runner's distributed cache falls back to anonymous
  # S3 access and every cache PUT/GET fails with AccessDenied.
  accesskey: {{ $ak | quote }}
  secretkey: {{ $sk | quote }}
  seaweedfs_s3_config: |
    {
      "identities": [
        {
          "name": "gitlab",
          "credentials": [
            { "accessKey": {{ $ak | quote }}, "secretKey": {{ $sk | quote }} }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging", "GetObject", "PutObject", "DeleteObject"]
        }
      ]
    }
{{- end -}}
