{{- /*
s3cmd config Secret for the GitLab toolbox backup-utility.

GitLab 19 (chart 10.x) removed the bundled object storage and its checkConfig
now hard-fails the render unless
`gitlab.gitlab.toolbox.backups.objectStorage.config.secret` points at a Secret
holding an s3cmd `.s3cfg`. We render it from the same SeaweedFS S3 creds the
rest of the stack uses (see helm-gitlab.backupS3cmdConfig).

The backups bucket itself is set via gitlab.global.appConfig.backups.bucket
(gitlab-backups); this Secret only carries the connection/credentials.

Not `resource-policy: keep` — it is a pure derivation of the seaweedfs-s3
credentials, regenerated each upgrade from those lookup-stable creds, so it
never holds unique state.
*/ -}}
{{- if .Values.gitlab.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.toolboxBackup.s3cmdSecretName }}
  labels: {{- include "helm-gitlab.labels" . | nindent 4 }}
type: Opaque
stringData:
  config: |
    {{- include "helm-gitlab.backupS3cmdConfig" . | nindent 4 }}
{{- end -}}
